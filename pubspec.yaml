name: skillbridge
description: SkillBridge - Bridge your skills to career readiness. Final year academic project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.1.6
  cloud_firestore: ^5.5.0

  # State & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Utils
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^8.0.2
  flutter_dotenv: ^5.2.1
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Design system
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Assessment & charts
  fl_chart: ^0.69.0
  share_plus: ^10.0.2
  url_launcher: ^6.2.5
  pdf: ^3.11.1
  printing: ^5.14.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/env.example
  # Optional: add assets/fonts/ with Outfit family for full branding (see docs/BRANDING.md)
